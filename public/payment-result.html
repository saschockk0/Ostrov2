<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Оплата принята — Парусный Клуб «Остров»</title>
  <link rel="stylesheet" href="/styles.css" />
  <style>
    .pay-result {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .pay-result__card {
      max-width: 480px;
      background: #fff;
      border-radius: 16px;
      padding: 40px 28px;
      box-shadow: 0 10px 40px rgba(20, 50, 90, 0.12);
    }
    .pay-result__icon {
      width: 72px;
      height: 72px;
      margin: 0 auto 20px;
      border-radius: 50%;
      background: #e6f3ff;
      color: #1f6fb2;
      font-size: 38px;
      line-height: 72px;
    }
    .pay-result h1 { font-size: 24px; margin: 0 0 12px; color: #14325a; }
    .pay-result p { color: #4a5b70; line-height: 1.55; margin: 0 0 22px; }
  </style>
</head>
<body>
  <div class="pay-result">
    <div class="pay-result__card">
      <div class="pay-result__icon">✓</div>
      <h1>Спасибо за оплату!</h1>
      <p>
        Платёж обрабатывается банком. Как только он подтвердится, бронь будет
        закреплена, а на вашу почту придёт чек от ЮKassa. Мы свяжемся с вами
        для уточнения деталей отдыха.
      </p>
      <a class="btn btn-primary" href="/">Вернуться на сайт</a>
    </div>
  </div>
</body>
</html>
