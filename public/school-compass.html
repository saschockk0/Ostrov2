<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Школа капитанов — превью блока</title>
    <meta name="robots" content="noindex, nofollow" />
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lora:wght@500;600&family=Montserrat:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" />
    <style>
      :root {
        /* палитра основного сайта */
        --paper: #f5efe1;
        --paper-soft: #fbf7ee;
        --ink: #0e2f46;
        --ink-soft: #274f6c;
        --mute: #5a6e7e;
        --line: rgba(14, 47, 70, 0.42);
        --line-soft: rgba(14, 47, 70, 0.16);
        --accent: #b3742e;        /* латунь */
        --accent-deep: #8f5a20;
        --accent-soft: #e3c089;
        --north: #c0492c;         /* «север» — тёплый красный из бренда */
        --display: "Lora", Georgia, serif;
        --font: "Montserrat", "Segoe UI", sans-serif;
        --mono: "JetBrains Mono", monospace;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: var(--font);
        color: var(--ink);
        background:
          radial-gradient(120% 90% at 50% 0%, var(--paper-soft) 0%, var(--paper) 58%),
          var(--paper);
        background-attachment: fixed;
        min-height: 100vh;
      }

      .school {
        position: relative;
        max-width: 1280px;
        margin: 0 auto;
        padding: clamp(48px, 7vw, 96px) 24px 0;
        overflow: hidden;
      }

      .school__head { text-align: center; max-width: 660px; margin: 0 auto; position: relative; z-index: 4; }
      .school__eyebrow {
        font-family: var(--mono); font-size: 0.72rem; letter-spacing: 0.24em;
        text-transform: uppercase; color: var(--accent-deep); margin: 0 0 16px;
      }
      .school__title {
        font-family: var(--display); font-weight: 600; letter-spacing: -0.02em; line-height: 1.05;
        font-size: clamp(2.1rem, 5vw, 3.6rem); margin: 0;
      }
      .school__title em { font-style: italic; color: var(--accent-deep); }
      .school__sub { color: var(--ink-soft); margin: 16px auto 0; max-width: 48ch; font-size: 1rem; line-height: 1.6; }

      /* ---- область компаса ---- */
      .compass-wrap { position: relative; margin: clamp(20px, 4vw, 44px) auto 0; max-width: 1080px; }
      .stage { position: relative; width: 100%; aspect-ratio: 1200 / 620; }
      .stage svg { position: absolute; inset: 0; width: 100%; height: 100%; overflow: visible; }

      #dial { transform-box: view-box; transform-origin: 600px 600px; transition: transform 0.75s cubic-bezier(0.22, 1, 0.36, 1); }
      #north { filter: drop-shadow(0 0 5px rgba(192, 73, 44, 0.55)); }
      .north-label { fill: var(--north); font-family: var(--mono); font-size: 17px; font-weight: 600; }

      .tick { stroke: var(--line); }
      .tick--major { stroke: var(--ink); }
      .num { fill: rgba(14, 47, 70, 0.72); font-family: var(--mono); font-size: 19px; }
      .ring { fill: none; stroke: rgba(14, 47, 70, 0.13); }
      .diag { stroke: rgba(179, 116, 46, 0.45); stroke-width: 1; }

      /* ---- радар-свип ---- */
      #sweep { transform-box: view-box; transform-origin: 600px 600px; opacity: 0; pointer-events: none; }
      #sweep.run { animation: radar 0.95s ease-out; }
      @keyframes radar {
        0%   { opacity: 0;    transform: rotate(-104deg); }
        14%  { opacity: 0.55; }
        100% { opacity: 0;    transform: rotate(104deg); }
      }

      /* ---- варианты (кнопки на дуге) ---- */
      .opt {
        position: absolute; transform: translate(-50%, -50%); z-index: 3;
        appearance: none; cursor: pointer; white-space: nowrap;
        font-family: var(--font); font-weight: 600; font-size: 0.95rem;
        color: var(--ink-soft); background: rgba(255, 255, 255, 0.62);
        border: 1px solid var(--line-soft); border-radius: 999px;
        padding: 11px 20px; backdrop-filter: blur(4px);
        transition: color 0.25s, border-color 0.25s, background 0.25s, box-shadow 0.25s, transform 0.2s;
      }
      .opt:hover { color: var(--ink); border-color: var(--accent); }
      .opt.is-active {
        color: #fff5e6; border-color: var(--accent-deep);
        background: var(--accent-deep);
        animation: optPulse 2.4s ease-in-out infinite;
      }
      @keyframes optPulse {
        0%, 100% { box-shadow: 0 0 0 0 rgba(179, 116, 46, 0.0), 0 8px 22px rgba(179, 116, 46, 0.22); }
        50%      { box-shadow: 0 0 0 7px rgba(179, 116, 46, 0.12), 0 8px 22px rgba(179, 116, 46, 0.34); }
      }
      .opt--left { left: 16%; top: 46%; }
      .opt--center { left: 50%; top: 13%; }
      .opt--right { left: 84%; top: 46%; }

      /* ---- центральная карточка ---- */
      .card {
        position: absolute; left: 50%; top: 62%; transform: translateX(-50%);
        z-index: 4; width: min(440px, 88%); text-align: center; padding: 8px 18px 10px;
        background: radial-gradient(72% 130% at 50% 42%, rgba(245, 239, 225, 0.96) 0%, rgba(245, 239, 225, 0.78) 58%, rgba(245, 239, 225, 0) 100%);
      }
      .card__tag { font-family: var(--mono); font-size: 0.66rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--accent-deep); }
      .card__desc { color: var(--ink-soft); font-size: 0.92rem; line-height: 1.5; margin: 9px 0 16px; min-height: 2.6em; }
      .cta {
        display: inline-flex; align-items: center; gap: 8px;
        background: var(--accent-deep); color: #fff5e6; border: none; cursor: pointer;
        font-family: var(--font); font-weight: 600; font-size: 1rem;
        padding: 14px 30px; border-radius: 999px;
        transition: background 0.2s, transform 0.18s, box-shadow 0.25s;
      }
      .cta:hover { background: #74491a; transform: translateY(-2px); box-shadow: 0 14px 30px rgba(143, 90, 32, 0.32); }
      .cta:active { transform: translateY(0) scale(0.98); }

      /* ---- мобайл: дуга скрыта, варианты в столбик ---- */
      @media (max-width: 760px) {
        .compass-wrap { max-width: 520px; }
        .stage { display: none; }
        .opt { position: static; transform: none; width: 100%; text-align: center; }
        .opts { display: flex; flex-direction: column; gap: 10px; margin-top: 18px; }
        .card { position: static; transform: none; width: 100%; margin: 18px auto 0; }
      }
      @media (min-width: 761px) { .opts { display: contents; } }

      .footnote { text-align: center; color: var(--mute); font-size: 0.78rem; padding: 40px 16px 48px; }

      @media (prefers-reduced-motion: reduce) {
        #dial { transition: none; }
        #sweep.run { animation: none; }
        .opt.is-active { animation: none; }
        .cta:hover, .opt:hover { transform: none; }
      }
    </style>
  </head>
  <body>
    <section class="school" id="school">
      <div class="school__head">
        <p class="school__eyebrow">Парусная школа «Остров»</p>
        <h2 class="school__title">Хочу научиться ходить <em>под парусом</em></h2>
        <p class="school__sub">Выберите, с чего начинаете — подберём программу и поможем выйти на воду.</p>
      </div>

      <div class="compass-wrap">
        <div class="stage">
          <svg id="cmp" viewBox="0 0 1200 620" preserveAspectRatio="xMidYMax meet" aria-hidden="true">
            <defs>
              <linearGradient id="sweepGrad" x1="0" y1="0" x2="1" y2="0">
                <stop offset="0" stop-color="#b3742e" stop-opacity="0" />
                <stop offset="1" stop-color="#b3742e" stop-opacity="0.5" />
              </linearGradient>
              <!-- свечение луча (заготовка-радар из 21st.dev / Magic) -->
              <filter id="sweepGlow" x="-60%" y="-60%" width="220%" height="220%">
                <feGaussianBlur stdDeviation="7" />
              </filter>
              <!-- лицо прибора + тень корпуса -->
              <radialGradient id="faceGrad" cx="50%" cy="100%" r="100%">
                <stop offset="0" stop-color="#f3ecdd" />
                <stop offset="0.7" stop-color="#ece2cd" />
                <stop offset="1" stop-color="#e3d8bf" />
              </radialGradient>
              <filter id="housingShadow" x="-25%" y="-25%" width="150%" height="170%">
                <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#0e2f46" flood-opacity="0.18" />
              </filter>
            </defs>
            <!-- КОРПУС компаса: форма (сектор) + окантовка (латунный обод с кантами) -->
            <g id="housing">
              <path d="M600 600 L119 462 A500 500 0 0 1 1081 462 Z" fill="url(#faceGrad)" filter="url(#housingShadow)" />
              <line x1="600" y1="600" x2="119" y2="462" stroke="#b3742e" stroke-width="3" opacity="0.7" />
              <line x1="600" y1="600" x2="1081" y2="462" stroke="#b3742e" stroke-width="3" opacity="0.7" />
              <path d="M112 460 A508 508 0 0 1 1088 460" fill="none" stroke="#0e2f46" stroke-width="1.5" opacity="0.5" />
              <path d="M119 462 A500 500 0 0 1 1081 462" fill="none" stroke="#b3742e" stroke-width="9" />
              <path d="M126 464 A492 492 0 0 1 1074 464" fill="none" stroke="#0e2f46" stroke-width="1.5" opacity="0.5" />
            </g>
            <g id="rings"></g>
            <g id="dial">
              <g id="ticks"></g>
              <g id="nums"></g>
              <!-- север: красный указатель, поворачивается вместе со всей розой -->
              <g id="north">
                <line x1="600" y1="600" x2="600" y2="206" stroke="#c0492c" stroke-width="3.5" stroke-linecap="round" />
                <polygon points="600,150 612,208 588,208" fill="#c0492c" />
                <text x="600" y="130" class="north-label" text-anchor="middle">С</text>
              </g>
            </g>
            <!-- радар-свип со светящимся лучом (поверх шкалы) -->
            <g id="sweep">
              <polygon points="600,600 427,68 773,68" fill="url(#sweepGrad)" />
              <line x1="600" y1="600" x2="773" y2="68" stroke="#e3c089" stroke-width="6" stroke-linecap="round" filter="url(#sweepGlow)" opacity="0.9" />
              <line x1="600" y1="600" x2="773" y2="68" stroke="#f3e2c4" stroke-width="2" stroke-linecap="round" />
            </g>
            <circle cx="600" cy="600" r="11" fill="#f5efe1" stroke="#0e2f46" stroke-width="3" />
            <circle cx="600" cy="600" r="3.4" fill="#0e2f46" />
          </svg>
        </div>

        <div class="opts">
          <button class="opt opt--left" data-opt="0" type="button">Уже ходил под парусом</button>
          <button class="opt opt--center is-active" data-opt="1" type="button">Я новичок</button>
          <button class="opt opt--right" data-opt="2" type="button">Хочу в команду регаты</button>
        </div>

        <div class="card">
          <span class="card__tag" id="cardTag">Новичок</span>
          <p class="card__desc" id="cardDesc"></p>
          <a class="cta" id="cardCta" href="#">Записаться на обучение</a>
        </div>
      </div>

      <p class="footnote">Превью блока «Школа капитанов» · не индексируется</p>
    </section>

    <script src="/school-compass.js" defer></script>
  </body>
</html>
